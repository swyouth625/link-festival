<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINK : 우리의 연결지도</title>

<style>
body{
  margin:0;
  background:#050816;
  color:white;
  overflow:hidden;
  font-family:'Malgun Gothic',sans-serif;
}

#title{
  position:absolute;
  top:30px;
  width:100%;
  text-align:center;
  z-index:10;
}

#title h1{
  margin:0;
  font-size:70px;
  color:#7dd3fc;
  letter-spacing:4px;
}

#title p{
  margin-top:5px;
  font-size:20px;
  opacity:0.8;
}

#count{
  position:absolute;
  top:20px;
  right:30px;
  font-size:24px;
  z-index:10;
}

#dreams{
  position:absolute;
  left:25px;
  bottom:25px;
  width:420px;
  font-size:18px;
  line-height:1.8;
  z-index:10;
}

canvas{
  display:block;
}
</style>
</head>

<body>

<div id="title">
  <h1>LINK</h1>
  <p>우리의 연결지도</p>
</div>

<div id="count">
참여자 <span id="total">0</span>명
</div>

<div id="dreams"></div>

<canvas id="canvas"></canvas>

<script>

const API =
"https://script.google.com/macros/s/AKfycbx7s_0AE0OnoHHcEXPzSncn1Mqo9IhXrpUDZO7d2D1F73Ul0kxpvKEwPPJFSabYw7ONyg/exec";

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const interests = {
  "행복": {x:0.50,y:0.15},
  "친구": {x:0.28,y:0.32},
  "사랑": {x:0.72,y:0.32},
  "가족": {x:0.20,y:0.55},
  "진로": {x:0.80,y:0.55},
  "휴식": {x:0.28,y:0.78},
  "나":   {x:0.72,y:0.78},
  "학업": {x:0.50,y:0.90}
};

let people=[];

async function loadData(){

  try{

    const res = await fetch(API);
    const data = await res.json();

    people = data;

    document.getElementById("total").innerText =
      data.length;

    document.getElementById("dreams").innerHTML =
      data.slice(-10)
      .reverse()
      .map(d => `⭐ ${d.name} : ${d.dream}`)
      .join("<br>");

  }catch(err){

    console.log(err);

  }
}

function draw(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  // 배경 별
  for(let i=0;i<80;i++){

    ctx.beginPath();

    ctx.arc(
      (i*137)%canvas.width,
      (i*211)%canvas.height,
      1.5,
      0,
      Math.PI*2
    );

    ctx.fillStyle="rgba(255,255,255,0.4)";
    ctx.fill();

  }

  // 중앙 LINK
  const centerX = canvas.width/2;
  const centerY = canvas.height/2;

  const starSize =
    45 + (people.length * 0.5);

  ctx.beginPath();
  ctx.arc(
    centerX,
    centerY,
    starSize,
    0,
    Math.PI*2
  );

  ctx.fillStyle="#FFD700";
  ctx.shadowBlur=40;
  ctx.shadowColor="#FFD700";
  ctx.fill();

  ctx.shadowBlur=0;

  ctx.fillStyle="white";
  ctx.font="bold 30px sans-serif";
  ctx.textAlign="center";

  ctx.fillText(
    "LINK",
    centerX,
    centerY+10
  );

  // 관심사 노드
  Object.keys(interests).forEach(name=>{

    const p = interests[name];

    const x = p.x*canvas.width;
    const y = p.y*canvas.height;

    const count =
      people.filter(
        person => person.interest === name
      ).length;

    ctx.beginPath();
    ctx.arc(x,y,35,0,Math.PI*2);

    ctx.fillStyle="#7dd3fc";
    ctx.fill();

    ctx.fillStyle="white";
    ctx.font="20px sans-serif";

    ctx.fillText(
      `${name} (${count})`,
      x,
      y+60
    );

  });

  // 참여자
  people.forEach(person=>{

    const target =
      interests[person.interest];

    if(!target) return;

    const tx =
      target.x*canvas.width;

    const ty =
      target.y*canvas.height;

    const angle =
      Math.random()*Math.PI*2;

    const dist =
      60 + Math.random()*120;

    const px =
      tx + Math.cos(angle)*dist;

    const py =
      ty + Math.sin(angle)*dist;

    ctx.beginPath();
    ctx.moveTo(px,py);
    ctx.lineTo(tx,ty);

    ctx.strokeStyle=
      "rgba(125,211,252,0.35)";

    ctx.stroke();

    ctx.beginPath();
    ctx.arc(
      px,
      py,
      5,
      0,
      Math.PI*2
    );

    ctx.fillStyle="white";
    ctx.fill();

  });

  requestAnimationFrame(draw);

}

loadData();

setInterval(
  loadData,
  10000
);

draw();

</script>
</body>
</html>
